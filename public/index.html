<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AEM of Competency — Your ultimate interview question bank. Sign in to access curated Q&A preparation.">
  <title>AEM of Competency — Sign In</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-3d">
    <div class="shape"></div><div class="shape"></div><div class="shape"></div>
    <div class="shape"></div><div class="shape"></div><div class="shape"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card" id="login-card">
      <div class="auth-logo">
        <div class="icon">🎯</div>
        <h1>AEM of Competency</h1>
        <p>Sign in to continue</p>
      </div>

      <div class="error-msg" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="login-username" placeholder="Enter username" required autocomplete="username">
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" id="login-password" placeholder="Enter password" required autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)">👁</button>
          </div>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Sign up</a>
      </div>

      <div class="auth-brand">AEM of Competency — Interview Question Bank</div>
    </div>
  </div>

  <script>
    // Check if already logged in
    const token = localStorage.getItem('aem_token');
    if (token) {
      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })
        .then(r => { if (r.ok) window.location.href = '/dashboard.html'; })
        .catch(() => {});
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁'; }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');
      errorEl.classList.remove('show');
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('login-username').value.trim(),
            password: document.getElementById('login-password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        localStorage.setItem('aem_token', data.token);
        localStorage.setItem('aem_user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
