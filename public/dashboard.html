<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AEM FE Competency Dashboard — Browse and study interview questions organized by topic.">
  <title>AEM FE Competency — Questions</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>


  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <button class="hamburger-btn" id="hamburger-btn">☰</button>
      <button class="desktop-sidebar-toggle" id="desktop-sidebar-toggle" title="Toggle Sidebar">☰</button>
      <a href="/dashboard.html" class="nav-brand">
        <div class="brand-icon">🎯</div>
        <span>AEM FE Competency</span>
      </a>
      <div class="nav-links">
        <a href="/dashboard.html" class="nav-link active" id="nav-questions">📋 Questions</a>
        <a href="/admin.html" class="nav-link" id="nav-admin" style="display:none;">⚙️ Admin</a>
      </div>
    </div>
    <div class="nav-right">
      <div class="user-badge" id="user-badge">
        <div class="user-avatar" id="user-avatar">A</div>
        <span class="username" id="display-username">admin</span>
        <span class="admin-tag" id="admin-tag" style="display:none;">ADMIN</span>
      </div>
      <button class="btn-icon" id="theme-toggle" title="Toggle theme">🌙</button>
      <button class="btn-signout" id="signout-btn">↗ Sign out</button>
    </div>
  </nav>

  <!-- Mobile Menu -->
  <div class="mobile-menu" id="mobile-menu">
    <a href="/dashboard.html" class="nav-link active">📋 Questions</a>
    <a href="/admin.html" class="nav-link" id="nav-admin-mobile" style="display:none;">⚙️ Admin</a>
  </div>

  <!-- Dashboard -->
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">TOPICS</div>
      <div id="topics-list">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content" id="main-content">
      <div class="page-header">
        <h2 id="page-title">Questions</h2>
        <div class="result-count" id="result-count"></div>
      </div>

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Search questions...">
      </div>

      <div id="questions-container">
        <div class="loading"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
  <div class="toast" id="toast"></div>

  <script>
    // ── Theme ──
    const savedTheme = localStorage.getItem('aem_theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    const themeBtn = document.getElementById('theme-toggle');
    themeBtn.textContent = (document.documentElement.getAttribute('data-theme') === 'light') ? '☀️' : '🌙';
    themeBtn.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('aem_theme', next);
      themeBtn.textContent = next === 'light' ? '☀️' : '🌙';
    });

    // ── Hamburger Menu ──
    document.getElementById('hamburger-btn').addEventListener('click', () => {
      document.getElementById('mobile-menu').classList.toggle('open');
    });

    // ── Desktop Sidebar Toggle ──
    const desktopToggle = document.getElementById('desktop-sidebar-toggle');
    if (desktopToggle) {
      desktopToggle.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('collapsed');
        document.getElementById('main-content').classList.toggle('expanded');
      });
    }

    // ── Auth Check ──
    const token = localStorage.getItem('aem_token');
    const user = JSON.parse(localStorage.getItem('aem_user') || 'null');
    if (!token || !user) { window.location.href = '/index.html'; }

    const API = (url, opts = {}) => {
      opts.headers = { ...opts.headers, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
      return fetch(url, opts).then(async r => {
        if (r.status === 401) { localStorage.clear(); window.location.href = '/index.html'; }
        const text = await r.text();
        const data = text ? JSON.parse(text) : { success: true };
        if (!r.ok) throw new Error(data.error || 'Request failed');
        return data;
      });
    };

    // ── Setup User Info ──
    document.getElementById('display-username').textContent = user.username;
    document.getElementById('user-avatar').textContent = user.username[0].toUpperCase();
    if (user.role === 'admin') {
      document.getElementById('admin-tag').style.display = 'inline';
      document.getElementById('nav-admin').style.display = 'flex';
      const mobileAdmin = document.getElementById('nav-admin-mobile');
      if (mobileAdmin) mobileAdmin.style.display = 'flex';
    }

    document.getElementById('signout-btn').addEventListener('click', () => {
      localStorage.clear();
      window.location.href = '/index.html';
    });

    // ── State ──
    let allTopics = [];
    let allQuestions = [];
    let activeTopic = null;
    let searchTimeout = null;
    let currentPage = 1;
    const pageSize = 20;



    // ── Load Data ──
    async function loadTopics() {
      try {
        allTopics = await API('/api/topics');
        renderTopics();
      } catch (err) { showToast(err.message, 'error'); }
    }

    async function loadQuestions(topicId, search) {
      try {
        let url = '/api/questions';
        const params = [];
        if (topicId) params.push('topicId=' + topicId);
        if (search) params.push('search=' + encodeURIComponent(search));
        if (params.length) url += '?' + params.join('&');

        allQuestions = await API(url);
        currentPage = 1;
        renderQuestions();
      } catch (err) { showToast(err.message, 'error'); }
    }

    // ── Render Topics ──
    function renderTopics() {
      const totalCount = allTopics.reduce((s, t) => s + t.questionCount, 0);
      let html = `<div class="topic-item ${!activeTopic ? 'active' : ''}" data-topic="">
        <span>All Topics</span>
        <span class="topic-count">${totalCount}</span>
      </div>`;

      allTopics.forEach(t => {
        html += `<div class="topic-item ${activeTopic === t.id ? 'active' : ''}" data-topic="${t.id}">
          <span>${t.name}</span>
          <span class="topic-count">${t.questionCount}</span>
        </div>`;
      });

      document.getElementById('topics-list').innerHTML = html;

      document.querySelectorAll('.topic-item').forEach(el => {
        el.addEventListener('click', () => {
          activeTopic = el.dataset.topic || null;
          renderTopics();
          loadQuestions(activeTopic, document.getElementById('search-input').value);
        });
      });
    }

    // ── Render Questions ──
    function renderQuestions() {
      const container = document.getElementById('questions-container');
      
      // Animation trigger
      container.classList.remove('fade-slide-up');
      void container.offsetWidth; // trigger reflow
      container.classList.add('fade-slide-up');

      document.getElementById('result-count').textContent = allQuestions.length + ' results';

      if (!allQuestions.length) {
        container.innerHTML = '<div class="no-results"><div class="icon">📭</div><p>No questions found</p></div>';
        return;
      }

      // Pagination slice
      const startIndex = (currentPage - 1) * pageSize;
      const endIndex = startIndex + pageSize;
      const paginatedQuestions = allQuestions.slice(startIndex, endIndex);
      const totalPages = Math.ceil(allQuestions.length / pageSize);

      // Group by topic
      const grouped = {};
      paginatedQuestions.forEach(q => {
        if (!grouped[q.topicName]) grouped[q.topicName] = [];
        grouped[q.topicName].push(q);
      });

      let html = '';
      let globalIndex = startIndex + 1;
      Object.entries(grouped).forEach(([topicName, questions]) => {
        html += `<div class="topic-section">
          <div class="topic-section-header">
            <h3>${topicName}</h3>
            <span class="count-badge">${questions.length}</span>
          </div>`;

        questions.forEach(q => {
          html += `<div class="question-card-wrapper">
            <div class="question-card" id="qcard-${q.id}">
              <div class="question-left">
                <span class="question-num">${globalIndex}.</span>
                <span class="question-text">${escapeHtml(q.question)}</span>
              </div>
              <button class="btn-show-answer" onclick="toggleAnswer('${q.id}')">
                Show Answer ▾
              </button>
            </div>
            <div class="answer-content" id="answer-${q.id}">${escapeHtml(q.answer)}</div>
          </div>`;
          globalIndex++;
        });

        html += '</div>';
      });

      if (totalPages > 1) {
        html += `<div class="pagination">
          <button class="btn-page" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>← Previous</button>
          <span class="page-info">Page ${currentPage} of ${totalPages}</span>
          <button class="btn-page" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
        </div>`;
      }

      container.innerHTML = html;
    }

    function changePage(dir) {
      currentPage += dir;
      renderQuestions();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleAnswer(id) {
      const answerEl = document.getElementById('answer-' + id);
      const btn = document.querySelector(`#qcard-${id} .btn-show-answer`);
      
      if (answerEl.classList.contains('show')) {
        answerEl.classList.remove('show');
        btn.innerHTML = 'Show Answer ▾';
      } else {
        // Close all other open answers
        document.querySelectorAll('.answer-content.show').forEach(el => {
          el.classList.remove('show');
          const siblingBtnId = el.id.replace('answer-', '');
          const siblingBtn = document.querySelector(`#qcard-${siblingBtnId} .btn-show-answer`);
          if (siblingBtn) siblingBtn.innerHTML = 'Show Answer ▾';
        });

        answerEl.classList.add('show');
        btn.innerHTML = 'Hide Answer ▴';
      }
    }

    // ── Search ──
    document.getElementById('search-input').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        loadQuestions(activeTopic, e.target.value.trim());
      }, 300);
    });

    // ── Sidebar Toggle (Mobile) ──
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // ── Utils ──
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast show ' + type;
      setTimeout(() => { toast.className = 'toast'; }, 3000);
    }

    // ── Init ──
    loadTopics();
    loadQuestions();
  </script>
</body>
</html>
